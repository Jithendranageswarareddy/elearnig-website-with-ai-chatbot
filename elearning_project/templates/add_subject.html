{% extends 'base.html' %}
{% block title %}Add Subject{% endblock %}
{% block content %}
<section class="page-shell section-stack fade-in">
  <header class="page-header section-header">
    <div>
      <h1 class="mb-1">Create New Subject</h1>
      <p class="section-subtitle">Add a subject and map it to the correct semester.</p>
    </div>
    <div class="page-actions">
      <a href="{% url 'view_subjects' %}" class="btn btn-secondary btn-sm">Back to Subjects</a>
    </div>
  </header>

  <div class="page-content card card-glass form-shell">
    <div class="card-body">
      <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-md-6">
          <label class="form-label">Subject Name</label>
          <input type="text" name="name" class="form-control" placeholder="e.g., Data Structures" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Subject Code</label>
          <input type="text" name="subject_code" class="form-control" placeholder="e.g., CS1024" required>
        </div>
        <div class="col-12">
          <label class="form-label">Semester</label>
          <select name="semester_id" class="form-select" required>
            <option value="">Select semester...</option>
            {% for sem in semesters %}
              <option value="{{ sem.id }}">Semester {{ sem.number }} - {{ sem.regulation }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="5" placeholder="Brief description of the subject..."></textarea>
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1 js-btn-loading" data-loading-text="Creating...">Create Subject</button>
          <a href="{% url 'view_subjects' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
