{% extends 'base.html' %}
{% block title %}Add Lesson{% endblock %}
{% block content %}
<section class="page-shell section-stack fade-in">
  <header class="page-header section-header">
    <div>
      <h1 class="mb-1">Add New Lesson</h1>
      <p class="section-subtitle">Create a lesson and assign it to a subject with an ordered position.</p>
    </div>
    <div class="page-actions">
      <a href="{% url 'view_lessons' %}" class="btn btn-secondary btn-sm">Back to Lessons</a>
    </div>
  </header>

  <div class="page-content card card-glass form-shell">
    <div class="card-body">
      <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-md-4">
          <label class="form-label">Subject</label>
          <select name="subject_id" class="form-select" required>
            {% for subject in subjects %}
              <option value="{{ subject.id }}">{{ subject.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-5">
          <label class="form-label">Title</label>
          <input type="text" name="title" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Order</label>
          <input type="number" name="order" class="form-control" required>
        </div>
        <div class="col-12">
          <label class="form-label">Content</label>
          <textarea name="content" class="form-control" rows="8" required></textarea>
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1 js-btn-loading" data-loading-text="Adding...">Add Lesson</button>
          <a href="{% url 'view_lessons' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
