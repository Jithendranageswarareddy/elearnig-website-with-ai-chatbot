{% extends 'base.html' %}
{% block title %}Edit PDF{% endblock %}
{% block content %}
<section class="page-shell section-stack fade-in">
  <header class="page-header section-header">
    <div>
      <h1 class="mb-1">Edit Reference PDF</h1>
      <p class="section-subtitle">Update the PDF title and subject assignment without re-uploading the file.</p>
    </div>
    <div class="page-actions">
      <a href="{% url 'pdf_list' %}?mine=1" class="btn btn-secondary btn-sm">Back to PDFs</a>
    </div>
  </header>

  <div class="page-content card card-glass form-shell">
    <div class="card-body">
      <form method="post" class="row g-3">
        {% csrf_token %}
        <div class="col-12">
          <label class="form-label">Document Title</label>
          <input
            type="text"
            name="title"
            class="form-control"
            value="{{ pdf.title }}"
            required>
        </div>
        <div class="col-12">
          <label class="form-label">Subject</label>
          <select name="subject_id" class="form-select" required>
            {% for subject in subjects %}
              <option value="{{ subject.id }}" {% if subject.id == pdf.subject_id %}selected{% endif %}>
                {{ subject.name }} (Semester {{ subject.semester.number }})
              </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1 js-btn-loading" data-loading-text="Saving...">Save Changes</button>
          <a href="{% url 'pdf_list' %}?mine=1" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
